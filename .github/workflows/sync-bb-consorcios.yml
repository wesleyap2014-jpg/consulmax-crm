name: Sincronização BB Consórcios

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Tipo de sincronização
        required: true
        default: full
        type: choice
        options:
          - full
          - segment
          - assemblies
      segment:
        description: Segmento quando o tipo for segment
        required: false
        default: auto_fipe
        type: choice
        options:
          - auto_ipca
          - auto_fipe
          - outros_bens
          - pesados
          - motocicleta
          - imoveis
      job_id:
        description: ID da solicitação já criada pela Central de Grupos
        required: false
        default: ""
        type: string
  schedule:
    # GitHub usa UTC. 11:30 UTC equivale a 07:30 em Rondônia (UTC-4).
    - cron: "30 11 * * *"

permissions:
  contents: read

concurrency:
  group: bb-consorcios-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Executar robô BB
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Verificar configuração segura
        id: config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BB_ROBOT_PORTAL_URL: ${{ secrets.BB_ROBOT_PORTAL_URL }}
          BB_ROBOT_USERNAME: ${{ secrets.BB_ROBOT_USERNAME }}
          BB_ROBOT_PASSWORD: ${{ secrets.BB_ROBOT_PASSWORD }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -n "$BB_ROBOT_PORTAL_URL" ] && [ -n "$BB_ROBOT_USERNAME" ] && [ -n "$BB_ROBOT_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Sincronização ignorada: adicione os cinco secrets obrigatórios do robô BB."
          fi

      - name: Instalar dependências do worker
        if: steps.config.outputs.ready == 'true'
        working-directory: workers/bb-groups-worker
        run: npm ci

      - name: Montar e compilar worker
        if: steps.config.outputs.ready == 'true'
        working-directory: workers/bb-groups-worker
        run: npm run build

      - name: Executar sincronização
        if: steps.config.outputs.ready == 'true'
        working-directory: workers/bb-groups-worker
        env:
          SYNC_TRIGGER: ${{ github.event_name == 'schedule' && 'cron' || (inputs.job_id != '' && 'queue' || 'dispatch') }}
          SYNC_MODE: ${{ inputs.mode || 'full' }}
          SYNC_SEGMENT: ${{ inputs.segment || '' }}
          SYNC_JOB_ID: ${{ inputs.job_id || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BB_ROBOT_PORTAL_URL: ${{ secrets.BB_ROBOT_PORTAL_URL }}
          BB_ROBOT_USERNAME: ${{ secrets.BB_ROBOT_USERNAME }}
          BB_ROBOT_PASSWORD: ${{ secrets.BB_ROBOT_PASSWORD }}
          BB_LOGIN_USERNAME_SELECTOR: ${{ vars.BB_LOGIN_USERNAME_SELECTOR }}
          BB_LOGIN_PASSWORD_SELECTOR: ${{ vars.BB_LOGIN_PASSWORD_SELECTOR }}
          BB_LOGIN_SUBMIT_SELECTOR: ${{ vars.BB_LOGIN_SUBMIT_SELECTOR }}
        run: node scripts/run-github-sync.mjs
